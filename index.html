<!DOCTYPE html>
<html>
<head>
    <title>Jaycell</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <script src="https://kit.fontawesome.com/b5af5863ec.js" crossorigin="anonymous"></script>

    <style>
        body {
            height: 100vh;
            background-image: url('https://i.pinimg.com/originals/e5/f9/d5/e5f9d5265ccb6969696f69663091ca15.gif'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .overlay {
            height: 100vh;
            background-color: rgba(0,0,0,0.6); 
        }

        
        .letter-border {
            border: 4px solid white;       
            padding: 10px;                 
            border-radius: 10px;            
            display: inline-block;         
            transition: transform 0.3s, background-color 0.3s;
            animation: pulse 1.2s infinite ease-in-out;
        }

       
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }

        
        .letter-border:hover {
            background-color: rgba(255,255,255,0.2);
        }
    </style>
</head>

<body>

    <div class="overlay d-flex justify-content-center align-items-center text-center ">

        <div>

            <div class="fs-1 mt-3">
                <i class="fa-sharp fa-solid fa-j fa-3x letter-border"
                 style="color: rgb(255, 255, 255); font-weight: bold; font-family: cursive;"></i>
                <i class="fa-solid fa-a fa-3x letter-border" style="color: rgb(248, 248, 248);font-weight: bold; font-family: cursive;"></i>
                <i class="fa-solid fa-y fa-y fa-3x letter-border" style="color: rgb(255, 253, 254); font-weight: bold; font-family: cursive;"></i>
                <i class="fa-solid fa-c fa-c fa-3x letter-border" style="color: rgb(255, 255, 255); font-weight: bold; font-family: cursive;"></i>
                <i class="fa-solid fa-e fa-e fa-3x letter-border" style="color: rgb(255, 255, 255); font-weight: bold; font-family: cursive;"></i>
                <i class="fa-solid fa-l fa-l fa-3x letter-border" style="color: rgb(251, 249, 255); font-weight: bold; font-family: cursive;"></i>
                <i class="fa-solid fa-l fa-l fa-3x letter-border" style="color: rgb(255, 255, 255); font-weight: bold; font-family: cursive;"></i>
              <br>
                <i class="fa-sharp fa-solid fa-b fa-2x letter-border"
                 style="color: rgb(250, 250, 250); font-weight: bold; font-family: cursive;"></i>
                <i class="fa-solid fa-a fa-2x letter-border" style="color: rgb(253, 252, 253);font-weight: bold; font-family: cursive;"></i>
                <i class="fa-solid fa-n fa-n fa-2x letter-border" style="color: rgb(255, 255, 255); font-weight: bold; font-family: cursive;"></i>
                <i class="fa-solid fa-i fa-i fa-2x letter-border" style="color: rgb(255, 255, 255); font-weight: bold; font-family: cursive;"></i>
                <i class="fa-solid fa-q fa-q fa-2x letter-border" style="color: #fffdff; font-weight: bold; font-family: cursive;"></i>
                <i class="fa-solid fa-u fa-u fa-2x letter-border" style="color: rgb(255, 255, 255); font-weight: bold; font-family: cursive;"></i>
                <i class="fa-solid fa-e fa-e fa-2x letter-border" style="color: rgb(255, 255, 255); font-weight: bold; font-family: cursive;"></i>
                <i class="fa-solid fa-d fa-d fa-2x letter-border" style="color: rgb(255, 255, 255); font-weight: bold; font-family: cursive;"></i>

            </div>
        

    </div>

</body>
</html>
